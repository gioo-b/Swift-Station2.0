type="text"
id="nome"

>

>

type="text"
id="assunto"

id="mensagem"
placeholder="Digite sua mensagem"
required
></textarea>

<button type="submit" class="botao">
Enviar Mensagem
</button>

</form>

<p id="status"></p>
